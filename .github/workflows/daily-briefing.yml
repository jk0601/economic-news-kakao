# 매일 한국 시간 09:00 경 (UTC 00:00) 경제 뉴스 브리핑 + Notion + 카카오(선택)
# Secrets: Settings → Secrets and variables → Actions → Repository secrets
name: Daily economic briefing

on:
  schedule:
    # UTC 00:00 ≈ KST 09:00 (한국은 일광절약 없음)
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write config.py from secrets
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_ACCESS_TOKEN: ${{ secrets.KAKAO_ACCESS_TOKEN }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        run: python scripts/write_config_from_env.py

      - name: Run main.py
        run: python main.py

      # GitHub Pages: 저장소 Settings → Pages → Branch main, folder /docs
      # iframe 예: https://<계정>.github.io/<저장소명>/briefing.html
      - name: Commit and push HTML (docs)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No HTML changes to commit."
          else
            git commit -m "chore: daily briefing HTML [skip ci]"
            git push
          fi
